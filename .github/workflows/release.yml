name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # npm provenance + mcp-publisher GitHub OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build dist/mcp-server.mjs
        run: npm run build

      - name: Build Claude Desktop Extension bundle
        run: npm run pack

      - name: Install mcp-publisher
        # Asset name on modelcontextprotocol/registry is exactly
        # mcp-publisher_linux_amd64.tar.gz (no version in the middle).
        # gh CLI is preinstalled on the runner and pulls the latest release.
        run: |
          gh release download --repo modelcontextprotocol/registry \
            --pattern "mcp-publisher_linux_amd64.tar.gz" \
            --output mcp-publisher.tar.gz \
            --clobber
          tar -xzf mcp-publisher.tar.gz
          chmod +x mcp-publisher
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate MCP registry metadata
        # Runs BEFORE npm publish on purpose. npm versions are immutable and
        # cannot be reused, so a server.json the registry would reject must fail
        # the release here — not after the package is already public.
        run: ./mcp-publisher validate server.json

      - name: Publish to npm
        # --provenance attaches a Sigstore attestation tying the tarball to
        # this workflow run, this commit, and this tag. Surfaces as the
        # green "Provenance" badge on npmjs.com.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Authenticate to MCP registry via GitHub OIDC
        # No secret needed — the github-oidc method exchanges the workflow's
        # OIDC token for a registry session bound to io.github.<owner>/...
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP registry
        run: ./mcp-publisher publish

      - name: Attach the .mcpb bundle to the GitHub Release
        # Last, deliberately: a GitHub Release is the public announcement, so it
        # must only exist once npm AND the registry have actually accepted the
        # version. Creating it earlier would advertise a release that a failed
        # npm publish left nowhere else. The release is usually created here; if
        # one already exists for the tag, the asset is replaced instead.
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" agent-ready-mcp.mcpb --clobber
          else
            gh release create "$TAG" agent-ready-mcp.mcpb --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
